backend:
  name: git-gateway
  branch: main

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  # ── Homepage Content ──
  - name: "pages"
    label: "Pages"
    files:
      - label: "Homepage"
        name: "homepage"
        file: "src/content/homepage.json"
        fields:
          # Hero Section
          - label: "Hero Section"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Tagline", name: "tagline", widget: "string", default: "Welcome" }
              - { label: "Heading", name: "heading", widget: "string", default: "Your journey to wellness starts here" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Button Text", name: "button_text", widget: "string", default: "Explore Sessions" }

          # About Section
          - label: "About Section"
            name: "about"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", default: "Hi, I'm Anna" }
              - { label: "Bio", name: "bio", widget: "markdown" }
              - { label: "Photo", name: "photo", widget: "image", required: false }

          # Contact Section
          - label: "Contact Section"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Heading", name: "heading", widget: "string", default: "Ready to start?" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Button Text", name: "button_text", widget: "string", default: "Send me an email" }

  # ── Sessions / Services ──
  - name: "sessions"
    label: "Sessions"
    folder: "src/content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Duration", name: "duration", widget: "string", hint: "e.g. 60 min, 4 weeks" }
      - { label: "Price", name: "price", widget: "string", hint: "e.g. €80" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Highlight this session" }
      - { label: "Order", name: "order", widget: "number", default: 0, hint: "Display order (lower = first)" }

  # ── Classes ──
  - name: "classes"
    label: "Classes"
    folder: "src/content/classes"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Type", name: "type", widget: "select", options: ["class", "combo"], default: "class" }
      - { label: "Display Order", name: "order", widget: "number", default: 1, required: false }
      - { label: "Title", name: "title", widget: "string", required: false }
      - { label: "Tag Line", name: "tag", widget: "string", required: false, hint: "e.g. Tuesday Evenings" }
      - { label: "Schedule", name: "schedule", widget: "string", required: false, hint: "e.g. Tuesdays · 6:00–7:15 PM CST" }
      - { label: "Format", name: "format", widget: "string", required: false, hint: "e.g. Live Zoom" }
      - { label: "First Paragraph", name: "para1", widget: "text", required: false }
      - { label: "Second Paragraph", name: "para2", widget: "text", required: false }
      - { label: "Drop-in Price", name: "drop_in_price", widget: "string", required: false, hint: "Leave blank if not offered" }
      - { label: "Monthly Price", name: "monthly_price", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "Image Position", name: "image_position", widget: "string", required: false, default: "center", hint: "e.g. center top, center 30%" }
      - { label: "Enroll Button URL", name: "enroll_url", widget: "string", required: false, default: "#" }
      - { label: "Layout", name: "layout", widget: "select", options: ["normal", "reverse"], default: "normal", required: false }
      - { label: "Combo Description", name: "description", widget: "text", required: false }
      - { label: "Combo Price", name: "price", widget: "string", required: false }
      - { label: "Combo Price Period", name: "price_period", widget: "string", required: false, default: "/ month" }
      - { label: "Savings Text", name: "save_text", widget: "string", required: false }
